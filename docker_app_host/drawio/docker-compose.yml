services:
  drawio:
    container_name: drawio
    image: jgraph/drawio:30.0.4@sha256:1191a3d7b25c209ffd7344302a9c844becc0f7f1c4bc397e8e1ebe251fd048fb
    restart: unless-stopped
    environment:
      - TZ=America/New_York
      - DRAWIO_BASE_URL=https://drawio.${SECRET_INTERNAL_DOMAIN_NAME}
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.drawio.rule=Host(`drawio.${SECRET_INTERNAL_DOMAIN_NAME}`)
      - traefik.http.routers.drawio.tls=true
      - traefik.http.routers.drawio.tls.certresolver=cloudflare
      - traefik.http.routers.drawio.entrypoints=websecure
      - traefik.http.services.drawio.loadbalancer.server.port=8080
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL

networks:
  proxy:
    external: true
