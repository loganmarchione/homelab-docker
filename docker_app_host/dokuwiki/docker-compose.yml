services:
  dokuwiki:
    container_name: dokuwiki
    image: php:8.5-apache-bookworm@sha256:4e495f9a51382a24d0d7db56647c788c866d5a87115029efb98cb27c8964d27c
    restart: unless-stopped
    environment:
      - TZ=America/New_York
    networks:
      - proxy
    volumes:
      - 'dokuwiki_config:/var/www/html'
      - 'php_config:/usr/local/etc/php'
    labels:
      - traefik.enable=true
      - traefik.http.routers.wiki.rule=Host(`wiki.${SECRET_INTERNAL_DOMAIN_NAME}`)
      - traefik.http.routers.wiki.tls=true
      - traefik.http.routers.wiki.tls.certresolver=cloudflare
      - traefik.http.routers.wiki.entrypoints=websecure
      - traefik.http.services.wiki.loadbalancer.server.port=80
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID

networks:
  proxy:
    external: true

volumes:
  dokuwiki_config:
    driver: local
  php_config:
    driver: local
