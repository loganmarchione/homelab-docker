services:
  mongo:
    container_name: graylog-mongo
    image: mongo:8.2.11@sha256:951c2ff9fc6bdb6cb89b1dfea4a0e8ae3ee4fb287c0bf579b2bba54c7803f75d
    restart: unless-stopped
    environment:
      - TZ=UTC
    env_file:
      - /custom/files/graylog_mongo.env
    networks:
      - graylog_mongo
    expose:
      - '27017/tcp'
    volumes:
      - 'mongo_data:/data/db'
      - 'mongo_config:/data/configdb'
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
  opensearch:
    container_name: graylog-opensearch
    image: opensearchproject/opensearch:2.19.6@sha256:8690b204fe914c60ca76d451ac73bc0481e034d32d3779944c8caca56a2b003f
    restart: unless-stopped
    environment:
      - TZ=UTC
    env_file:
      - /custom/files/graylog_opensearch.env
    ulimits:
      memlock:
        soft: -1
        hard: -1
    networks:
      - graylog_opensearch
      - proxy
    ports:
      - '0.0.0.0:9200:9200/tcp'
    volumes:
      - 'opensearch_data:/usr/share/opensearch/data'
    healthcheck:
      test: ["CMD-SHELL", "curl -s -f http://localhost:9200/_cluster/health?pretty | grep -q '\"status\" : \"green\"\\|\"status\" : \"yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
  graylog:
    container_name: graylog
    image: graylog/graylog:7.1.5@sha256:91585f117c5599657211f0490b0412f6c50a5b0a5a54f3061b9ddc26e310956a
    restart: unless-stopped
    environment:
      - TZ=UTC
    env_file:
      - /custom/files/graylog.env
    networks:
      - graylog_mongo
      - graylog_opensearch
      - graylog
      - proxy
    ports:
      - '0.0.0.0:8515:8515/udp'
    depends_on:
      - mongo
      - opensearch
    volumes:
      - 'graylog:/usr/share/graylog/data'
      - 'geoipupdate_data:/usr/share/GeoIP:ro'
    labels:
      - traefik.enable=true
      - traefik.http.routers.graylogweb.rule=Host(`graylog.${SECRET_INTERNAL_DOMAIN_NAME}`)
      - traefik.http.routers.graylogweb.tls=true
      - traefik.http.routers.graylogweb.tls.certresolver=cloudflare
      - traefik.http.routers.graylogweb.entrypoints=websecure
      - traefik.http.services.graylogweb.loadbalancer.server.port=9000
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
  geoipupdate:
    container_name: graylog-geoipupdate
    image: ghcr.io/maxmind/geoipupdate:v8.0.0@sha256:51e70dd6f16cd3e4d845ac02d09940b10772a75b9d741427d235a78570923c1d
    restart: unless-stopped
    environment:
      - TZ=UTC
    env_file:
      - /custom/files/graylog_geoipupdate.env
    networks:
      - graylog
    depends_on:
      - graylog
    volumes:
      - 'geoipupdate_data:/usr/share/GeoIP'
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL

networks:
  graylog_mongo:
  graylog_opensearch:
  graylog:
  proxy:
    external: true

volumes:
  mongo_config:
    driver: local
  mongo_data:
    driver: local
  opensearch_data:
    driver: local
  graylog:
    driver: local
  geoipupdate_data:
    driver: local
